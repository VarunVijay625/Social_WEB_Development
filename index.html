<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css">
  <title>Da Wab</title>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <p>Name:
    <select id="names">placeholder</select>
  </p>
  <p>Relation:
    <select id="relation-select">
      <option>coworker</option>
      <option>dating</option>
      <option>friend</option>
      <option>have met</option>
      <option>roommate</option>
      <option>secret 3rd</option>
      <option>supervisor</option>
      <option>teammate</option>
    </select>
  </p>
  <p><input type="checkbox" id="detail-check"> detail</p>
  <p><button id="submit-btn">submit</button></p>

  <hr>

  <div id="results"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>

  <script>
  // Fetch the navigation component
  fetch('nav.html')
    .then(response => {
      // Check if the request was successful
      if (!response.ok) {
        throw new Error(`Failed to load nav: ${response.status}`);
      }
      return response.text(); // Convert response to text
    })
    .then(navHTML => {
      // Insert the navigation HTML into the placeholder
      document.getElementById('navbar-placeholder').innerHTML = navHTML;
    })
    .catch(error => {
      // Log errors (e.g., if nav.html is missing)
      console.error('Error loading navigation:', error);
    });
  </script>

</body>
</html>
