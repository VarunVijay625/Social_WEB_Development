<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css">
  <title>Login or Create Account</title>
  <h1>The Web</h1>
</head>
<body>
    <p>Does your name exist in our Web?
        
        <select id="choice-nam-select">
        </select>
    </p>
    <form id="account-info" action="index.html">
        <label for="name">First Name + Last Initial:</label>
        <input type="text" id="name" name="name_input"><br><br>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username_input"><br><br>
        <label for="password">Password:</label>
        <input type="text" id="password" name="password_input"><br><br>
        <input type="submit">
    </form>
    <div id="login-info"></div>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
