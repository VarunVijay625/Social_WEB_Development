<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Da Web - Graph</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { overflow: hidden; }
    #graph { display: block; }

    #legend {
      position: absolute;
      top: 100px;
      right: 16px;
      background: rgba(0,0,0,0.4);
      padding: 12px 16px;
      border-radius: 8px;
    }
    #legend p {
      margin: 4px 0;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-line {
      display: inline-block;
      width: 24px;
      height: 3px;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="login-dropdown">
    <button onclick="myFunction()" class="drop-btn">Login?</button>
    <div id="create-login" class="dropdown-content">
      <a href="login.html">Login</a>
      <a href="create_acct.html">Create an Account</a>
    </div>
  </div>

  <svg id="graph"></svg>

  <div id="legend">
    <p><span class="legend-line" style="background:blue"></span> Friend</p>
    <p><span class="legend-line" style="background:red"></span> Dating</p>
    <p><span class="legend-line" style="background:orange"></span> Coworker</p>
    <p><span class="legend-line" style="background:green"></span> Roommate</p>
    <p><span class="legend-line" style="background:gray"></span> Have Met</p>
    <p><span class="legend-line" style="background:purple"></span> Secret 3rd</p>
    <p><span class="legend-line" style="background:brown"></span> Supervisor</p>
    <p><span class="legend-line" style="background:teal"></span> Teammate</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="graph.js"></script>

  <script>
  // Fetch the navigation component
  fetch('nav.html')
    .then(response => {
      // Check if the request was successful
      if (!response.ok) {
        throw new Error(`Failed to load nav: ${response.status}`);
      }
      return response.text(); // Convert response to text
    })
    .then(navHTML => {
      // Insert the navigation HTML into the placeholder
      document.getElementById('navbar-placeholder').innerHTML = navHTML;
    })
    .catch(error => {
      // Log errors (e.g., if nav.html is missing)
      console.error('Error loading navigation:', error);
    });
  </script>

</body>
</html>
