<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css">
</head>
<script>
    function validateInput() {
        var action = document.getElementById("add-or-remove");
        var selectedValue = action.options[action.selectedIndex].value;
        if (selectedValue == "add") {
            changeTypeToText();
        }
        else if (selectedValue == "remove") {
            changeTypeToSelect();
        }
    }
    function changeTypeToText() {
        document.getElementById("person-1").outerHTML = '<input type="text" id="person-1"/>'

        document.getElementById("person-2").outerHTML = '<input type="text" id="person-2"/>'
    }
    function changeTypeToSelect() {
        document.getElementById("person-1").outerHTML = '<select id="person-1">'+'</select>'

        document.getElementById("person-2").outerHTML = '<select id="person-2">'+'</select>'
    }
    setInterval(validateInput, 1);
</script>

<body>
    <div id="navbar-placeholder"></div>

    <div id="create-login" class="dropdown-content">

  </div>

    <script>
        // Fetch the navigation component
        fetch('nav.html')
            .then(response => {
            // Check if the request was successful
            if (!response.ok) {
                throw new Error(`Failed to load nav: ${response.status}`);
            }
            return response.text(); // Convert response to text
            })
            .then(navHTML => {
            // Insert the navigation HTML into the placeholder
            document.getElementById('navbar-placeholder').innerHTML = navHTML;
            })
            .catch(error => {
            // Log errors (e.g., if nav.html is missing)
            console.error('Error loading navigation:', error);
            });
    </script>
</body>
</html>
