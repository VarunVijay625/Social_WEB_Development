<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css">
</head>
<script>
    function validateInput() {
        var action = document.getElementById("add-or-remove");
        var selectedValue = action.options[action.selectedIndex].value;
        if (selectedValue == "add") {
            changeTypeToText();
        }
        else if (selectedValue == "remove") {
            changeTypeToSelect();
        }
    }
    function changeTypeToText() {
        document.getElementById("person-1").outerHTML = '<input type="text" id="person-1"/>'

        document.getElementById("person-2").outerHTML = '<input type="text" id="person-2"/>'

        document.getElementById("relationship").outerHTML = '<select id="relationship">'+'<option>is coworkers with</option>'+'<option>is dating</option>'+'<option>is friends with</option>'+'<option>has met</option>'+'<option>is roommates with</option>'+'<option>is a secret 3rd option with</option>'+'<option>is a supervisor of</option>'+'<option>is teammates with</option>'+'</select>'
    }
    function changeTypeToSelect() {
        document.getElementById("person-1").outerHTML = '<select id="person-1">'+'</select>'

        document.getElementById("person-2").outerHTML = '<select id="person-2">'+'</select>'

        document.getElementById("relationship").outerHTML = '<select id="relationship">'+'<option>is no longer coworkers with</option>'+'<option>is no longer dating</option>'+'<option>is no longer friends with</option>'+'<option>has not met</option>'+'<option>is no longer roommates with</option>'+'<option>is no longer a secret 3rd option with</option>'+'<option>is no longer a supervisor of</option>'+'<option>is no longer teammates with</option>'+'</select>'
    }
    // setInterval(validateInput, 1);
</script>

<body>
    <div id="navbar-placeholder"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>

    <p>
    </select>
    <select id="add-or-remove" onchange="validateInput()">
      <option>add</option>
      <option>remove</option>
    </select>

    <input type="text" id="person-1">

    <select id="relationship">
        <option>is coworkers with</option>
        <option>is dating</option>
        <option>is friends with</option>
        <option>has met</option>
        <option>is roommates with</option>
        <option>is a secret 3rd option with</option>
        <option>is a supervisor of</option>
        <option>is teammates with</option>
    </select>
    
    <input type="text" id="person-2">
    </p>

    <p><button id="submit-btn">submit</button></p>

    <script>
        // Fetch the navigation component
        fetch('nav.html')
            .then(response => {
            // Check if the request was successful
            if (!response.ok) {
                throw new Error(`Failed to load nav: ${response.status}`);
            }
            return response.text(); // Convert response to text
            })
            .then(navHTML => {
            // Insert the navigation HTML into the placeholder
            document.getElementById('navbar-placeholder').innerHTML = navHTML;
            })
            .catch(error => {
            // Log errors (e.g., if nav.html is missing)
            console.error('Error loading navigation:', error);
            });
    </script>
</body>
</html>
