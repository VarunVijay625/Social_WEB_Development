<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="login-dropdown">
    <button onclick="myFunction()" class="drop-btn">Login?</button>
    <div id="create-login" class="dropdown-content">
      <a href="login.html">Login</a>
      <a href="create_acct.html">Create an Account</a>
    </div>
  </div>
  <script src="./script.js"></script>

    <script>
        // Fetch the navigation component
        fetch('nav.html')
            .then(response => {
            // Check if the request was successful
            if (!response.ok) {
                throw new Error(`Failed to load nav: ${response.status}`);
            }
            return response.text(); // Convert response to text
            })
            .then(navHTML => {
            // Insert the navigation HTML into the placeholder
            document.getElementById('navbar-placeholder').innerHTML = navHTML;
            })
            .catch(error => {
            // Log errors (e.g., if nav.html is missing)
            console.error('Error loading navigation:', error);
            });
    </script>
</body>
</html>
